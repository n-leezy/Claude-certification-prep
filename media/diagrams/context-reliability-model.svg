<text x="620.0" y="113.55" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2430">⟵ CACHE this stable prefix</text>
<text x="620.0" y="129.55" text-anchor="middle" font-size="13" font-weight="400" fill="#1f2430">(static first, byte-identical).</text>
<text x="620.0" y="145.55" text-anchor="middle" font-size="13" font-weight="400" fill="#1f2430">Reads cheap &amp; fast; writes slightly pricier.</text>
<rect x="440" y="236" width="360" height="40" rx="12" fill="#f4f1ec" stroke="#1f2430" stroke-width="2"/>
<text x="620.0" y="260.55" text-anchor="middle" font-size="13" font-weight="400" fill="#1f2430">⟵ Keep variable content LAST</text>
<rect x="40" y="320" width="235" height="70" rx="12" fill="#ffffff" stroke="#1f2430" stroke-width="2"/>
<text x="157.5" y="351.25" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2430">Too long?</text>
<text x="157.5" y="369.25" text-anchor="middle" font-size="15" font-weight="400" fill="#1f2430">Compact / summarize old turns</text>
<rect x="300" y="320" width="235" height="70" rx="12" fill="#ffffff" stroke="#1f2430" stroke-width="2"/>
<text x="417.5" y="351.25" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2430">Offload state to</text>
<text x="417.5" y="369.25" text-anchor="middle" font-size="15" font-weight="400" fill="#1f2430">external memory (files/DB)</text>
<rect x="560" y="320" width="240" height="70" rx="12" fill="#e7f3ec" stroke="#3a9b6e" stroke-width="2"/>
<text x="680.0" y="343.55" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2430">Reliability:</text>
<text x="680.0" y="359.55" text-anchor="middle" font-size="13" font-weight="400" fill="#1f2430">validate+retry • backoff •</text>
<text x="680.0" y="375.55" text-anchor="middle" font-size="13" font-weight="400" fill="#1f2430">self-consistency • evals</text>
